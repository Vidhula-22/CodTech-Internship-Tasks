<!DOCTYPE html>
<html>
<head>
  <title>Productivity Dashboard</title>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="script.js" defer></script>

  <style>
  body {
    font-family: "Segoe UI", sans-serif;
    background: linear-gradient(135deg, #97a8f6, #764ba2);
    margin: 0;
    padding: 20px;
  }

  .container {
    background: white;
    border-radius: 12px;
    padding: 20px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
  }

  h2 {
    text-align: center;
  }

  .grid {
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 20px;
    margin-top: 20px;
  }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  th, td {
    padding: 12px;
    text-align: center;
  }

  th {
    background: #7c9ee1;
    color: white;
  }

  tr:nth-child(even) {
    background: #f2f2f2;
  }

  .badge {
    padding: 5px 10px;
    border-radius: 8px;
    color: white;
    font-size: 12px;
  }

  .prod { background: green; }
  .unprod { background: red; }
  .neutral { background: gray; }

  .chart-container {
    width: 250px;
    height: 250px;
    margin: auto;
  }
</style>
</head>

<body>

<div class="container">
  <h2>📊 Productivity Dashboard</h2>

  <div class="grid">

  <table>
    <thead>
      <tr>
        <th>Website</th>
        <th>Time (minutes)</th>
        <th>Category</th>
      </tr>
    </thead>
    <tbody id="data"></tbody>
  </table>

  <div class="chart-container">
    <canvas id="chart"></canvas>
  </div>

</div>

</body>
</html>
